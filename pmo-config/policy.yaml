version: 0.4.0-stable-candidate
workflow:
  canonical_flow:
    - source
    - requirement
    - design
    - delivery
    - build_review
    - qa
    - release

enums:
  modes:
    - Lite
    - Standard
    - Strict
  statuses:
    - To Do
    - In Progress
    - Review / Test
    - Done
  review_stages:
    - none
    - code
    - qa
    - business
    - security
  evidence_statuses:
    - verified
    - supported
    - inferred
    - missing
    - conflict
  approval_statuses:
    - pending
    - approved
    - rejected
  approval_gates:
    - Scope Approved
    - Design Ready
    - Release Approved
  task_sources:
    - file
    - github
  strict_triggers:
    - payment
    - financial_calculation
    - pii
    - sensitive_data
    - authentication
    - authorization
    - permission
    - irreversible_action
    - external_integration
    - legal_compliance
    - production_data_migration
    - critical_infrastructure
    - public_sector_formal_acceptance

permissions:
  git_mutation_requires_human_confirmation:
    - commit
    - push
    - tag
  production_release_requires_human_confirmation: true
  sensitive_paths:
    - .env
    - .env.*
    - "**/*secret*"
    - "**/*credential*"
    - "**/*private-key*"
    - "**/*.pem"
    - "**/*.key"

